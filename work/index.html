<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kate Pincott - Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
:root{
  --bg: oklch(0.985 0.006 80);
  --surface: oklch(0.965 0.008 80);
  --fg: oklch(0.22 0.012 60);
  --fg-mute: oklch(0.45 0.012 60);
  --fg-faint: oklch(0.55 0.010 60);
  --line: oklch(0.86 0.012 70);
  --accent: oklch(0.62 0.14 38);
  --accent-soft: oklch(0.62 0.14 38 / 0.10);
  --accent-text: oklch(0.55 0.14 38); /* darker accent for small text/links - AA */

  --gap-row: 32px;
  --gap-section: 96px;
  --leading-body: 1.55;

  --font-body: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-display: "Geist", ui-sans-serif, system-ui, sans-serif;
  --font-display-italic: "Instrument Serif", "Geist", serif;
  --font-mono: "Geist Mono", ui-monospace, monospace;
  --weight-display: 500;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--bg);overflow-x:clip}
body{overflow-x:clip}
body{
  font-family:var(--font-body);
  color:var(--fg);
  background:var(--bg);
  font-size:16px;
  line-height:var(--leading-body);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv11";
}
::selection{background:var(--accent-soft);color:var(--fg)}

.shell{
  max-width:1180px;
  margin:0 auto;
  padding:48px 56px 96px;
}

nav.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  line-height:1;
  padding-bottom:8px;
  margin-bottom:96px;
}
nav.top .brand{
  font-family:var(--font-display);
  font-weight:500;
  font-size:15px;
  letter-spacing:-0.005em;
}
nav.top .brand a{color:var(--fg);text-decoration:none}
nav.top .brand .dot{color:var(--accent)}
nav.top .brand{transition:font-weight .35s ease}
nav.top .brand:hover{font-weight:600}
nav.top ul{
  list-style:none;
  display:flex;
  align-items:center;
  gap:28px;
  margin:0;padding:0;
  font-size:13.5px;
}
nav.top a{
  color:var(--fg-mute);
  text-decoration:none;
  font-weight:400;
  border-bottom:1px solid transparent;
  transition: color .18s ease, border-color .18s ease;
}
nav.top a:hover{color:var(--accent);border-bottom-color:var(--accent)}
nav.top a.contact-cta{display:inline-block;background:var(--fg);color:var(--bg);padding:7px 16px;border-radius:4px;border-bottom:none;transition:border-radius .18s ease-out,background-color .18s ease,color .18s ease}
nav.top a.contact-cta:hover{background:var(--accent);color:var(--bg);border-radius:999px}
nav.top a.current{color:var(--accent);font-weight:600}

/* Hero */
.hero{
  display:grid;
  grid-template-columns: minmax(0, 8fr) minmax(0, 4fr);
  gap:80px;
  margin-bottom:64px;
  align-items:end;
}
.hero .eyebrow{
  font-family:var(--font-mono);
  font-size:11.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--fg-faint);
  margin-bottom:32px;
  display:flex;
  gap:14px;
  align-items:center;
}
.hero .eyebrow .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  display:inline-block;
}
.hero h1{
  font-family:var(--font-display);
  font-weight:var(--weight-display);
  font-size:clamp(38px, 5.4vw, 64px);
  line-height:1.04;
  letter-spacing:-0.024em;
  margin:0;
  color:var(--fg);
  text-wrap:balance;
  max-width:18ch;
}
.hero h1 em{
  font-family:var(--font-display-italic);
  font-style:italic;
  font-weight:400;
  color:var(--accent);
  font-size:1.05em;
}
.hero p.intro{
  font-size:16px;
  color:var(--fg-mute);
  line-height:1.55;
  margin:0;
  max-width:40ch;
}

/* Pull quote - subtle, right-aligned tagline */
.pull{
  margin:0 0 96px;
  padding:0;
}
.pull p{
  margin:0 0 0 auto;
  text-align:right;
  font-family:var(--font-display-italic);
  font-style:italic;
  font-weight:400;
  font-size:22px;
  line-height:1.4;
  letter-spacing:-0.006em;
  color:var(--accent);
  text-wrap:balance;
  max-width:48ch;
}
.pull p .accent{color:var(--accent)}

/* Section */
.section{
  margin-bottom:var(--gap-section);
}
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
  padding-bottom:18px;
  border-bottom:1px solid var(--line);
}
.section-head h2{
  font-family:var(--font-display);
  font-weight:500;
  font-size:14px;
  letter-spacing:0.02em;
  margin:0;
}
.section-head .ix{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--fg-faint);
  letter-spacing:0.06em;
}

/* Principle list */
.principles{
  display:flex;
  flex-direction:column;
}
.principles .p{
  display:grid;
  grid-template-columns: 60px 1fr minmax(0, 360px);
  gap:48px;
  padding:var(--gap-row) 0;
  border-bottom:1px solid var(--line);
  align-items:start;
}
.principles .p:first-child{padding-top:6px}
.principles .p:last-child{border-bottom:0}
.principles .p .ix{
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--fg-faint);
  padding-top:2px;
  font-variant-numeric:tabular-nums;
}
.principles .p h3{
  font-family:var(--font-display);
  font-weight:500;
  font-size:22px;
  letter-spacing:-0.014em;
  line-height:1.2;
  margin:0;
  color:var(--fg);
  max-width:28ch;
  text-wrap:balance;
}
.principles .p h3 em{
  font-family:var(--font-display-italic);
  font-style:italic;
  color:var(--accent);
  font-weight:400;
}
.principles .p p{
  margin:0;
  font-size:14.5px;
  color:var(--fg-mute);
  line-height:1.55;
}
/* Unnumbered variant: drop the 60px numeric column when the .ix prefix is removed */
.principles.unnumbered .p{grid-template-columns: 1fr minmax(0, 360px)}

/* Italic-accent treatment for <em> inside principle supporting paragraphs (matches h3 em pattern) */
.principles .p p em{
  font-family:var(--font-display-italic);
  font-style:italic;
  color:var(--accent);
  font-weight:400;
}

/* Standalone intro paragraph - left-aligned, sits inside the hero below the h1 */
.intro-block{
  margin: 28px 0 0 0;
  text-align: left;
  max-width: 62ch;
  font-size: 17px;
  color: var(--fg-mute);
  line-height: 1.6;
}

/* Compact variant for the craft-bar four questions: ~half height, smaller text */
#craft-bar .principles .p{
  grid-template-columns: 40px 1fr;
  gap: 20px;
  padding: 14px 0;
}
#craft-bar .principles .p h3{
  font-size: 15px;
  line-height: 1.45;
  max-width: 60ch;
  font-weight: 500;
}
#craft-bar .principles .p .ix{font-size:11px}

/* Dictionary term */
.def{
  position:relative;
  border-bottom:1px dotted var(--fg-faint);
  cursor:help;
  transition:border-color .15s, color .15s;
}
.def:hover{color:var(--accent);border-bottom-color:var(--accent)}
.def-card{
  position:fixed;
  z-index:200;
  pointer-events:none;
  width:260px;
  background:var(--bg);
  border:1px solid var(--line);
  box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 22px 50px -20px rgba(0,0,0,.18), 0 8px 18px -8px rgba(0,0,0,.10);
  border-radius:12px;
  padding:18px 20px;
  font-family:var(--font-body);
  opacity:0;
  transform:translateY(-6px) scale(.98);
  transform-origin:top left;
  transition:opacity .2s ease, transform .25s cubic-bezier(.2,.7,.2,1);
}
.def-card.in{opacity:1;transform:translateY(0) scale(1)}
.def-card .term{font-family:var(--font-display);font-weight:600;font-size:17px;color:var(--fg);letter-spacing:-0.01em;margin:0 0 4px 0}
.def-card .pron{font-family:var(--font-mono);font-size:12px;color:var(--fg-faint);margin:0 0 2px 0}
.def-card .pos{font-family:var(--font-display-italic);font-style:italic;font-size:13px;color:var(--fg-mute);margin:0 0 12px 0}
.def-card .body{font-size:13.5px;color:var(--fg-mute);line-height:1.5;margin:0}

/* List */
.values{
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap:24px;
}
.values .v{
  padding:24px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  gap:10px;
  transition: border-color .25s, transform .25s ease;
}
.values .v:hover{border-color: color-mix(in oklch, var(--accent) 40%, var(--line));transform:translateY(-2px)}
.values .v .n{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--accent);
}
.values .v .star{
  font-family:var(--font-mono);
  font-size:20px;
  line-height:1;
  color:var(--accent);
}
.values .v h3{
  margin:0;
  font-family:var(--font-display);
  font-weight:500;
  font-size:18px;
  letter-spacing:-0.012em;
  color:var(--fg);
}
.values .v p{
  margin:0;
  font-size:14px;
  color:var(--fg-mute);
  line-height:1.5;
}

/* Working with me - two-column */
.cols{
  display:grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap:48px;
}
.cols .col{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.cols .col h3{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--fg-mute);
  margin:0;
}
.cols .col h3 .sign{
  color:var(--accent);
  font-weight:600;
  margin-right:6px;
}
.cols .col ul{
  list-style:none;
  padding:0;
  margin:0;
  display:flex;
  flex-direction:column;
}
.cols .col ul li{
  padding:14px 0;
  border-bottom:1px solid var(--line);
  font-size:15px;
  color:var(--fg);
  line-height:1.5;
}
.cols .col ul li:last-child{border-bottom:0}
.cols .col ul li b{
  font-family:var(--font-display);
  font-weight:500;
  display:block;
  margin-bottom:2px;
}
.cols .col ul li span{
  color:var(--fg-mute);
  font-size:14px;
}

/* Callout box - accent-tinted, left rule */
.callout{
  margin-top:32px;
  padding:22px 26px;
  background:var(--accent-soft);
  border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;
}
.callout p{
  margin:0;
  font-size:15px;
  line-height:1.55;
  color:var(--fg);
}
.callout p em{font-family:var(--font-display-italic);font-style:italic;color:var(--accent);font-weight:400}

/* Section-level lede paragraph (above principles list) */
.section .sub-lede{
  font-family:var(--font-display-italic);
  font-style:italic;
  font-size:17px;
  color:var(--fg-mute);
  margin:0 0 8px 0;
}
.section .sub-body{
  font-size:15px;
  color:var(--fg-mute);
  line-height:1.55;
  margin:0 0 32px 0;
  max-width:62ch;
}

/* Single-column variant of .cols (used in Feedback + Work-with-me after collapse) */
.cols.single{grid-template-columns:minmax(0,1fr);max-width:70ch}

/* Sticky right-rail TOC */
.toc{
  position:fixed;
  right:24px;
  top:96px;
  width:200px;
  z-index:30;
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--fg-faint);
  letter-spacing:0.04em;
  text-transform:uppercase;
  user-select:none;
  /* Soft backdrop so content underneath stays readable but doesn't compete */
  padding:18px 18px 18px 28px;
  border-radius:14px;
  background: linear-gradient(to right, transparent 0, color-mix(in oklch, var(--bg) 75%, transparent) 18%, color-mix(in oklch, var(--bg) 92%, transparent) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.toc-label{
  display:block;
  margin-bottom:14px;
  color:var(--fg-faint);
}
.toc ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.toc a{
  display:block;
  padding:4px 0;
  color:var(--fg-faint);
  text-decoration:none;
  border-left:1px solid var(--line);
  padding-left:12px;
  transition:color .15s ease, border-color .15s ease, padding .2s ease;
}
.toc a:hover{color:var(--fg)}
.toc a.active{
  color:var(--accent);
  border-left-color:var(--accent);
  padding-left:16px;
}
.toc .skim-toggle{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:18px;
  padding:6px 0;
  cursor:pointer;
  color:var(--fg-mute);
  transition:color .15s ease;
}
.toc .skim-toggle:hover{color:var(--fg)}
.toc .skim-toggle .switch{
  width:26px;
  height:14px;
  border-radius:999px;
  background:var(--line);
  position:relative;
  transition:background-color .2s ease;
  flex-shrink:0;
}
.toc .skim-toggle .switch::after{
  content:"";
  position:absolute;
  top:2px;
  left:2px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--bg);
  transition:transform .2s ease;
}
body.skim .toc .skim-toggle .switch{background:var(--accent)}
body.skim .toc .skim-toggle .switch::after{transform:translateX(12px)}
@media (max-width:1280px){.toc{display:none}}

/* Skim mode: hide bullet supporting copy + decorative blocks */
body.skim .col ul li span{display:none}
body.skim .col ul li{padding:8px 0}
body.skim .col ul li b{font-weight:500}
body.skim .values .v p{display:none}
body.skim .principles .p p{display:none}
body.skim .callout,
body.skim .pull,
body.skim .sub-body,
body.skim .sub-lede{display:none}
body.skim .brave ul li{padding:8px 0}
body.skim .cols .col > h3 + p{display:none}
body.skim .hero p.intro:nth-of-type(2){display:none}

/* Brave bit - growth edges */
.brave{
  display:grid;
  grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);
  gap:64px;
  padding:48px 56px;
  border:1px solid var(--line);
  border-radius:18px;
  background: linear-gradient(180deg, var(--accent-soft), transparent 80%);
  align-items:center;
}
.brave .lede{
  font-family:var(--font-display);
  font-size:22px;
  line-height:1.3;
  letter-spacing:-0.014em;
  margin:0;
  color:var(--fg);
}
.brave .lede em{
  font-family:var(--font-display-italic);
  font-style:italic;
  color:var(--accent);
}
.brave ul{
  list-style:none;
  padding:0;
  margin:0;
  display:flex;
  flex-direction:column;
}
.brave ul li{
  padding:14px 0;
  border-bottom:1px solid color-mix(in oklch, var(--accent) 25%, transparent);
  font-size:15px;
  color:var(--fg);
  line-height:1.5;
}
.brave ul li:last-child{border-bottom:0}
.brave ul li::before{
  content:"→";
  font-family:var(--font-mono);
  color:var(--accent);
  margin-right:10px;
}

/* CTA */
.cta{
  margin-top:var(--gap-section);
  padding:48px 56px;
  border:1px solid var(--line);
  border-radius:18px;
  display:grid;
  grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);
  gap:64px;
  align-items:center;
  background: linear-gradient(180deg, var(--accent-soft), transparent 80%);
}
.cta h2{
  font-family:var(--font-display);
  font-weight:500;
  font-size:clamp(28px, 3.2vw, 38px);
  line-height:1.1;
  letter-spacing:-0.02em;
  margin:0;
  text-wrap:balance;
}
.cta h2 em{font-family:var(--font-display-italic);font-style:italic;color:var(--accent);font-weight:400}
.cta p{margin:0;color:var(--fg-mute);font-size:15px;line-height:1.55}
.cta a.invite{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:14px;
  font-weight:500;
  color:var(--fg);
  text-decoration:none;
  border-bottom:1px solid var(--fg);
  padding-bottom:2px;
  margin-top:16px;
  transition: color .2s, border-color .2s, transform .25s cubic-bezier(.2,.7,.2,1);
}
.cta a.invite:hover{color:var(--accent);border-color:var(--accent)}

footer.foot{
  margin-top:64px;
  padding-top:32px;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--fg-faint);
  letter-spacing:0.06em;
  text-transform:uppercase;
}

/* Scroll reveal */
.reveal{
  opacity:0;
  transform:translateY(20px);
  transition: opacity .4s ease-out, transform .4s ease-out;
  will-change: opacity, transform;
}
.reveal.in{opacity:1;transform:translateY(0)}
@media (prefers-reduced-motion: reduce){
  .reveal{opacity:1;transform:none;transition:none}
}

@media (max-width: 880px){
  .shell{padding:32px 24px 64px}
  nav.top{margin-bottom:48px}
  nav.top ul{gap:18px;font-size:12.5px;flex-wrap:wrap}
  .hero{grid-template-columns:1fr;gap:32px;align-items:start}
  .principles .p{grid-template-columns:40px 1fr;gap:18px}
  .principles .p p{grid-column:2 / -1}
  /* Unnumbered principles have no index column. Their desktop rule
     (.principles.unnumbered .p) has higher specificity than the generic
     mobile rule above, so it wins even on phones — crushing the heading
     into a one-word-per-line strip. Collapse to a single stacked column. */
  .principles.unnumbered .p{grid-template-columns:1fr;gap:10px}
  .principles.unnumbered .p p{grid-column:1 / -1}
  .values{grid-template-columns:1fr}
  .cols{grid-template-columns:1fr;gap:32px}
  .brave{grid-template-columns:1fr;gap:24px;padding:32px}
  .cta{grid-template-columns:1fr;gap:24px;padding:32px}
}

/* ---- Mobile nav menu ---- */
.nav-toggle{
  display:none;
  position:relative;
  z-index:60;
  width:44px;
  height:44px;
  margin:-10px -10px -10px 0;
  padding:0;
  border:0;
  background:transparent;
  color:var(--fg);
  cursor:pointer;
}
.nav-toggle span{
  display:block;
  width:22px;
  height:1.5px;
  margin:5px auto;
  background:currentColor;
  transition:transform .3s cubic-bezier(.2,.7,.2,1), opacity .2s ease;
}
.nav-toggle[aria-expanded="true"] span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-toggle[aria-expanded="true"] span:nth-child(2){opacity:0}
.nav-toggle[aria-expanded="true"] span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.nav-backdrop{
  position:fixed;
  inset:0;
  z-index:40;
  background:oklch(0.22 0.012 60 / 0.32);
  opacity:0;
  visibility:hidden;
  transition:opacity .3s ease, visibility .3s ease;
}
.nav-backdrop.open{opacity:1;visibility:visible}

@media (max-width: 720px){
  nav.top{
    align-items:center;
    flex-wrap:nowrap;
    position:sticky;
    top:0;
    z-index:55;
    background:var(--bg);
    /* full-bleed background to the viewport edges regardless of shell padding */
    margin-left:calc(50% - 50vw);
    margin-right:calc(50% - 50vw);
    padding-left:calc(50vw - 50%);
    padding-right:calc(50vw - 50%);
    padding-top:14px;
    padding-bottom:12px;
    border-bottom:1px solid var(--line);
  }
  /* Stack the section heading and its grey mono label so they don't clash */
  .section-head{flex-direction:column;align-items:flex-start;gap:6px}
  .nav-toggle{display:block}
  nav.top ul{
    position:fixed;
    top:0;
    right:0;
    bottom:0;
    width:min(78vw, 300px);
    flex-direction:column;
    align-items:flex-start;
    justify-content:flex-start;
    gap:4px;
    margin:0;
    padding:88px 32px 40px;
    background:var(--surface);
    border-left:1px solid var(--line);
    box-shadow:-24px 0 60px -28px rgba(0,0,0,.45);
    font-size:16px;
    transform:translateX(100%);
    transition:transform .35s cubic-bezier(.2,.7,.2,1);
    z-index:50;
    overflow-y:auto;
  }
  nav.top ul.open{transform:translateX(0)}
  nav.top li{width:100%}
  nav.top a{
    display:block;
    width:100%;
    padding:12px 0;
    font-size:18px;
  }
  nav.top a.contact-cta{
    display:inline-block;
    width:auto;
    margin-top:12px;
    padding:10px 20px;
  }
  body.nav-open{overflow:hidden}
}

/* ---- Back to top ---- */
.to-top{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:45;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
  border-radius:50%;
  background:var(--surface);
  color:var(--fg);
  font-size:18px;
  line-height:1;
  cursor:pointer;
  box-shadow:0 8px 24px -12px rgba(0,0,0,.35);
  opacity:0;
  visibility:hidden;
  transform:translateY(8px);
  transition:opacity .25s ease, transform .25s ease, visibility .25s ease, color .15s ease, border-color .15s ease;
}
.to-top.show{opacity:1;visibility:visible;transform:translateY(0)}
body.nav-open .to-top{opacity:0;visibility:hidden}
.to-top:hover{color:var(--accent);border-color:var(--accent)}
.to-top:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

/* A11y: darker accent for small text + links (WCAG AA contrast) */
nav.top a:hover,
nav.top a.current,
.def:hover,
.cols .col h3 .sign,
.toc a.active,
.cta a.invite:hover,
.to-top:hover{color:var(--accent-text)}
.skip-link{position:absolute;left:8px;top:-48px;z-index:100;background:var(--fg);color:var(--bg);padding:9px 16px;border-radius:6px;font-size:14px;text-decoration:none;transition:top .15s ease}
.skip-link:focus{top:8px}
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
main:focus{outline:none}

/* Honour an OS-level request for more contrast (Settings > Accessibility).
   No toggle - we just deepen muted text, borders and small-text accent. */
@media (prefers-contrast: more){
  :root{
    --fg-mute: oklch(0.38 0.012 60);
    --fg-faint: oklch(0.42 0.010 60);
    --line: oklch(0.72 0.012 70);
    --accent-text: oklch(0.50 0.15 38);
  }
}

/* ---- Password gate ---- */
.gate{min-height:58vh;display:flex;align-items:center;justify-content:center;padding:40px 0}
.gate-card{max-width:430px;width:100%;text-align:center;border:1px solid var(--line);border-radius:18px;padding:44px 34px;background:var(--surface)}
.gate-lock{font-size:26px;margin-bottom:14px;color:var(--accent)}
.gate-card h1{font-family:var(--font-display);font-weight:500;font-size:23px;letter-spacing:-0.018em;margin:0 0 8px;color:var(--fg)}
.gate-card .sub{color:var(--fg-mute);font-size:15px;line-height:1.55;margin:0 0 22px}
#gate-form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#gate-pw{flex:1 1 200px;min-width:0;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--fg)}
#gate-pw:focus{outline:2px solid var(--accent);outline-offset:2px;border-color:var(--accent)}
#gate-form button{font-family:var(--font-body);font-size:14px;font-weight:500;padding:12px 22px;border:0;border-radius:8px;background:var(--fg);color:var(--bg);cursor:pointer;min-height:44px;transition:background-color .18s}
#gate-form button:hover{background:var(--accent)}
.gate-error{color:var(--accent-text);font-size:13.5px;margin:14px 0 0}
.gate-hint{color:var(--fg-faint);font-size:12px;margin:20px 0 0;font-family:var(--font-mono);letter-spacing:0.03em}
/* ---- Case studies ---- */
.work-hero{margin-bottom:64px}
.work-hero .eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:24px;display:flex;gap:14px;align-items:center}
.work-hero .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
.work-hero h1{font-family:var(--font-display);font-weight:500;font-size:clamp(34px,5vw,56px);line-height:1.05;letter-spacing:-0.022em;margin:0 0 20px;text-wrap:balance;max-width:18ch;color:var(--fg)}
.work-hero h1 em{font-family:var(--font-display-italic);font-style:italic;color:var(--accent);font-weight:400}
.work-hero .intro{font-size:17px;color:var(--fg-mute);line-height:1.55;max-width:54ch;text-wrap:pretty;margin:0}
.cases{display:flex;flex-direction:column;gap:56px}
.case{border-top:1px solid var(--line);padding-top:30px}
.case-head{display:flex;gap:20px;align-items:baseline;margin-bottom:22px}
.case-head .num{font-family:var(--font-mono);font-size:13px;color:var(--fg-faint)}
.case-head h2{font-family:var(--font-display);font-weight:500;font-size:23px;letter-spacing:-0.016em;margin:0;text-wrap:balance;color:var(--fg)}
.case-meta{font-family:var(--font-mono);font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-faint);margin:5px 0 0}
.case-body{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:28px}
.case-block h3{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-text);margin:0 0 8px}
.case-block p{font-size:14.5px;color:var(--fg-mute);line-height:1.6;margin:0;text-wrap:pretty}
@media (max-width:880px){.case-body{grid-template-columns:1fr;gap:16px}.case-head{gap:14px}}
</style>
</head>
